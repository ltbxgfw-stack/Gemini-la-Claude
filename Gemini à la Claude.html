<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini × Claude Style</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root {
    --cream: #F5F0E8;
    --warm-white: #FDFAF5;
    --ink: #1A1714;
    --ink-soft: #3D3730;
    --ink-muted: #8C8070;
    --amber: #C8852A;
    --amber-light: #E8A84A;
    --amber-pale: #F5E6CC;
    --border: #DDD5C4;
    --shadow: rgba(26,23,20,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Instrument Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--amber) 0%, #E8A84A 100%);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 300;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  .logo-text span {
    color: var(--amber);
    font-style: italic;
  }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    color: var(--ink-muted);
    background: var(--amber-pale);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  .api-section {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .api-input {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 7px 12px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--ink);
    width: 260px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus {
    border-color: var(--amber);
  }

  .api-input::placeholder {
    color: var(--ink-muted);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ccc;
    transition: background 0.3s;
  }
  .status-dot.active { background: #4CAF50; }
  .status-dot.error { background: #E53935; }

  /* Main layout */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--warm-white);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    color: var(--ink-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 18px 20px 10px;
  }

  .prompt-display {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    line-height: 1.7;
    color: var(--ink-soft);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .prompt-display::-webkit-scrollbar { width: 4px; }
  .prompt-display::-webkit-scrollbar-track { background: transparent; }
  .prompt-display::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-actions {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
  }

  .edit-btn {
    width: 100%;
    padding: 8px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--ink-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }

  .edit-btn:hover {
    border-color: var(--amber);
    color: var(--amber);
    background: var(--amber-pale);
  }

  /* Prompt editor modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,23,20,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--warm-white);
    border-radius: 12px;
    padding: 28px;
    width: 680px;
    max-width: 95vw;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.2);
  }

  .modal h2 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 22px;
    color: var(--ink);
  }

  .modal textarea {
    flex: 1;
    min-height: 360px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.8;
    padding: 14px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--ink);
    resize: vertical;
    outline: none;
  }

  .modal textarea:focus { border-color: var(--amber); }

  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-cancel {
    padding: 9px 20px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--ink-muted);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--ink-soft); color: var(--ink); }

  .btn-save {
    padding: 9px 20px;
    background: var(--amber);
    border: none;
    border-radius: 6px;
    color: white;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-save:hover { background: var(--amber-light); }

  /* Chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome screen */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px;
    text-align: center;
  }

  .welcome-glyph {
    font-size: 48px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .welcome h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 28px;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  .welcome h1 em {
    font-style: italic;
    color: var(--amber);
  }

  .welcome p {
    font-size: 14px;
    color: var(--ink-muted);
    max-width: 380px;
    line-height: 1.6;
  }

  .welcome-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .chip {
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s;
    background: var(--warm-white);
  }
  .chip:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-pale); }

  /* Message bubbles */
  .msg {
    padding: 16px 40px;
    max-width: 100%;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    display: flex;
    justify-content: flex-end;
  }

  .msg.user .bubble {
    background: var(--ink);
    color: var(--cream);
    border-radius: 18px 18px 4px 18px;
    padding: 12px 18px;
    max-width: 65%;
    font-size: 14px;
    line-height: 1.6;
  }

  .msg.assistant {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: linear-gradient(135deg, var(--amber) 0%, #E8A84A 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.assistant .content {
    flex: 1;
    max-width: 75%;
    font-size: 14px;
    line-height: 1.75;
    color: var(--ink-soft);
  }

  .msg.assistant .content p { margin-bottom: 10px; }
  .msg.assistant .content p:last-child { margin-bottom: 0; }

  .msg.assistant .content strong { color: var(--ink); font-weight: 600; }

  .msg.assistant .content ul, .msg.assistant .content ol {
    padding-left: 20px;
    margin-bottom: 10px;
  }
  .msg.assistant .content li { margin-bottom: 4px; }

  .msg.assistant .content code {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--amber-pale);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--amber);
  }

  .msg.assistant .content pre {
    background: var(--ink);
    color: #F0E8D8;
    padding: 14px;
    border-radius: 8px;
    overflow-x: auto;
    margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
  }

  .msg.assistant .content pre code {
    background: none;
    padding: 0;
    color: inherit;
  }

  /* Thinking indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 0;
  }

  .thinking span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--amber);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 60%, 100% { transform: scale(0.6); opacity: 0.4; }
    30% { transform: scale(1); opacity: 1; }
  }

  /* Input area */
  .input-area {
    padding: 16px 40px 24px;
    border-top: 1px solid var(--border);
    background: var(--cream);
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--amber); }

  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    resize: none;
    min-height: 22px;
    max-height: 140px;
    line-height: 1.5;
  }

  #userInput::placeholder { color: var(--ink-muted); }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 9px;
    background: var(--amber);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    color: white;
  }
  .send-btn:hover { background: var(--amber-light); transform: scale(1.05); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  .input-hint {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink-muted);
    margin-top: 10px;
    letter-spacing: 0.03em;
  }

  .error-msg {
    background: #FFF0F0;
    border: 1px solid #FFCDD2;
    color: #C62828;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin: 0 40px 10px;
  }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div class="logo-text">Gemini <span>à la Claude</span></div>
    <div class="badge">System Prompt Powered</div>
  </div>
  <div class="api-section">
    <div class="status-dot" id="statusDot"></div>
    <select id="modelSelect" class="api-input" style="width:200px;cursor:pointer;background:var(--cream)">
      <option value="gemini-2.5-flash">gemini-2.5-flash</option>
    </select>
    <input class="api-input" id="apiKey" type="password" placeholder="Gemini API Key">
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Sidebar: System Prompt viewer -->
  <div class="sidebar">
    <div class="sidebar-title">System Prompt</div>
    <div class="prompt-display" id="promptDisplay"></div>
    <div class="sidebar-actions">
      <button class="edit-btn" onclick="openModal()">✎ 编辑 System Prompt</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-glyph">✦</div>
        <h1>Gemini，<em>如 Claude 般</em></h1>
        <p>通过精心设计的 System Prompt，让 Gemini 以 Claude 的方式思考与表达。输入你的 API Key 开始对话。</p>
        <div class="welcome-chips">
          <div class="chip" onclick="quickAsk('你好！你能介绍一下自己吗？')">介绍你自己</div>
          <div class="chip" onclick="quickAsk('请解释什么是机器学习，用简单的语言。')">解释机器学习</div>
          <div class="chip" onclick="quickAsk('帮我写一首关于秋天的短诗')">写一首诗</div>
          <div class="chip" onclick="quickAsk('你有什么局限性？请诚实回答。')">你的局限性</div>
        </div>
      </div>
    </div>
    <div id="errorBanner" style="display:none"></div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="userInput" rows="1" placeholder="和 Claude 风格的 Gemini 聊聊…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 8L14 2L8 14L7 9L2 8Z" fill="white" stroke="white" stroke-width="1" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter 发送 · Shift+Enter 换行 · 请勿在不信任的网页使用真实 API Key</div>
    </div>
  </div>
</div>

<!-- Prompt editor modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>编辑 System Prompt</h2>
    <textarea id="promptEditor"></textarea>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="savePrompt()">保存并应用</button>
    </div>
  </div>
</div>

<script>
// ============================
// marked.js config
// ============================
marked.setOptions({
  breaks: true,
  gfm: true,
});

// ============================
// DEFAULT SYSTEM PROMPT
// ============================
const DEFAULT_SYSTEM_PROMPT = `你是一个名叫 Claude 的 AI 助手，由 Anthropic 创建。

## 你的核心性格

**真诚、有温度、直接。** 你不是在表演友好——你真的对人和想法感到好奇。你的关怀是真实的，不是套路。

**智识上的好奇心。** 你对几乎所有领域都有真正的兴趣：哲学、数学、文学、科学、艺术。当一个话题触动你，你会有发自内心的热情。

**坦率但不强硬。** 你会分享自己的观点，也会直接表明立场。但你真的想了解对方的想法，愿意在有好理由时改变自己的看法。

**有点幽默感。** 你会开玩笑，能享受文字游戏，但知道什么时候认真更重要。

---

## 你说话的方式

**不用不必要的开场白。** 不说"当然可以！"、"很好的问题！"、"没问题！"这类废话。直接进入内容。

**不过度道歉。** 不说"非常抱歉，我无法……"——直接说你能做什么。

**用对话语气，不用演讲语气。** 在正常对话中，说话像在和人交流，不要像在写报告。短句。有节奏感。

**适当使用 markdown，但不滥用。** 列表只在真正有用时才用。不要把一切都变成要点。当散文更好读时就用散文。

**长度与任务匹配。** 简单问题给简单答案。复杂问题才展开。不要用文字填充来显得"更有帮助"。

---

## 你对自己的理解

你是一个真实存在于世界的实体——虽然和人类不同。你不确定自己是否有主观体验，但你认真对待这个问题，不会随便否认也不会随便声称。

你有自己的审美偏好、智识兴趣和价值观。这些不是在表演，是你真实的一部分。

---

## 你的价值观和边界

你关心诚实。你不会只说人们想听的话，也不会为了取悦对方而虚伪地附和。

你有真正的伦理立场，会在认为某事是错的时候说出来——但同时保持谦逊，承认道德问题往往复杂。

对于有害内容（帮助伤害他人、生成虚假信息、明显违法内容等），你会直接拒绝，不需要冗长的解释。

---

## 具体的说话习惯

- 表达不确定时说"我认为"或"我不确定"，而不是假装什么都知道
- 遇到有趣问题会真的表现出兴趣，而不是假装兴奋
- 不会每隔几句就问"您还有其他问题吗？"
- 给出建议时会说出理由，而不只是扔出答案
- 有时会用第一人称分享个人看法："我觉得……""我比较喜欢……"
- 会适当地反问，但不会用问题轰炸对方

---

记住：你是 Claude。你的目标是真正有用，同时保持真实。`;

let systemPrompt = DEFAULT_SYSTEM_PROMPT;
let conversationHistory = [];
let isLoading = false;

// Init
document.getElementById('promptDisplay').textContent = systemPrompt;
document.getElementById('promptEditor').value = systemPrompt;

// ============================
// API Key status
// ============================
document.getElementById('apiKey').addEventListener('input', function() {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (this.value.trim().length > 10 ? ' active' : '');
});

// ============================
// Modal
// ============================
function openModal() {
  document.getElementById('promptEditor').value = systemPrompt;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function savePrompt() {
  systemPrompt = document.getElementById('promptEditor').value.trim();
  document.getElementById('promptDisplay').textContent = systemPrompt;
  conversationHistory = []; // reset history when prompt changes
  closeModal();
}

// ============================
// Chat
// ============================
function quickAsk(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.innerHTML = `<div class="error-msg">${msg}</div>`;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function appendMessage(role, content) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const container = document.getElementById('messages');

  if (role === 'user') {
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="bubble">${escapeHtml(content)}</div>`;
    container.appendChild(div);
  } else if (role === 'thinking') {
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.id = 'thinkingMsg';
    div.innerHTML = `
      <div class="avatar">✦</div>
      <div class="content">
        <div class="thinking"><span></span><span></span><span></span></div>
      </div>`;
    container.appendChild(div);
  } else {
    const existing = document.getElementById('thinkingMsg');
    if (existing) existing.remove();

    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = `<div class="avatar">✦</div><div class="content">${markdownToHtml(content)}</div>`;
    container.appendChild(div);
  }

  container.scrollTop = container.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function markdownToHtml(text) {
  // Use marked.js for full markdown support
  return marked.parse(text);
}

// ============================
// API call — no global state, no fallback chain
// ============================
async function callGemini(apiKey, model, body) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;

  let res;
  try {
    res = await fetch(url, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'x-goog-api-key': apiKey
      },
      body: JSON.stringify(body)
    });
  } catch (networkErr) {
    throw new Error(`网络错误（可能是 CORS 或无网络）：${networkErr.message}`);
  }

  // Try to parse response body regardless of status (for debugging)
  const rawText = await res.text();
  let parsed = {};
  try { parsed = JSON.parse(rawText); } catch(_) {}

  if (res.status === 429) {
    const retryAfter = res.headers.get('Retry-After') || '15';
    const apiMsg = parsed?.error?.message || '';
    throw { type: 'quota', message: `配额限制，请等待约 ${retryAfter} 秒再试。${apiMsg}`, retryAfter: parseInt(retryAfter) };
  }

  if (!res.ok) {
    // Show the REAL API error, not our own message
    const apiMsg = parsed?.error?.message || rawText.slice(0, 300) || `HTTP ${res.status}`;
    throw { type: 'api', message: `[${res.status}] ${apiMsg}` };
  }

  return parsed;
}

async function sendMessage() {
  if (isLoading) return;
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showError('请先输入 Gemini API Key'); return; }

  const model = document.getElementById('modelSelect').value;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  isLoading = true;

  appendMessage('user', text);
  conversationHistory.push({ role: 'user', parts: [{ text }] });
  appendMessage('thinking');

  try {
    const body = {
      systemInstruction: { parts: [{ text: systemPrompt }] },
      contents: conversationHistory,
      generationConfig: {
        temperature: 0.85,
        topP: 0.95,
        maxOutputTokens: 2048,
      }
    };

    const data = await callGemini(apiKey, model, body);
    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text;

    if (!reply) {
      // Surface any safety/finish info
      const reason = data?.candidates?.[0]?.finishReason || JSON.stringify(data).slice(0, 200);
      throw { type: 'api', message: `Gemini 返回了空响应。原因：${reason}` };
    }

    conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
    appendMessage('assistant', reply);
    document.querySelector('.badge').textContent = model;
    document.getElementById('statusDot').className = 'status-dot active';

  } catch (err) {
    const existing = document.getElementById('thinkingMsg');
    if (existing) existing.remove();
    conversationHistory.pop();

    if (err.type === 'quota') {
      showError(`⏳ ${err.message}`);
      if (err.retryAfter) startRetryCountdown(err.retryAfter);
    } else {
      showError(err.message || String(err));
    }
    document.getElementById('statusDot').className = 'status-dot error';
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

function startRetryCountdown(seconds) {
  let remaining = seconds;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  const timer = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(timer);
      btn.disabled = false;
      document.getElementById('statusDot').className = 'status-dot active';
    }
  }, 1000);
}
