<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini × Claude Style</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link rel="stylesheet" href="theme.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--color-cream);
    color: var(--color-ink);
    font-family: var(--font-sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: var(--color-warm-white);
    border-bottom: 1px solid var(--color-border);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--gradient-primary);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-family: var(--font-serif);
    font-size: var(--font-size-xl);
    font-weight: var(--font-weight-light);
    color: var(--color-ink);
    letter-spacing: var(--letter-spacing-tight);
  }

  .logo-text span {
    color: var(--color-amber);
    font-style: italic;
  }

  .badge {
    font-family: var(--font-mono);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-light);
    color: var(--color-ink-muted);
    background: var(--color-amber-pale);
    border: 1px solid var(--color-border);
    padding: 3px 8px;
    border-radius: var(--radius-pill);
    letter-spacing: var(--letter-spacing-wider);
  }

  .api-section {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .api-input {
    font-family: var(--font-mono);
    font-size: var(--font-size-base);
    padding: 7px 12px;
    background: var(--color-cream);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-ink);
    width: 260px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus {
    border-color: var(--color-amber);
  }

  .api-input::placeholder {
    color: var(--color-ink-muted);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: var(--radius-circle);
    background: #ccc;
    transition: background 0.3s;
  }
  .status-dot.active { background: var(--color-success); }
  .status-dot.error { background: var(--color-error); }

  /* Main layout */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--color-warm-white);
    border-right: 1px solid var(--color-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-title {
    font-family: var(--font-mono);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-regular);
    color: var(--color-ink-muted);
    letter-spacing: var(--letter-spacing-widest);
    text-transform: uppercase;
    padding: 18px 20px 10px;
  }

  .prompt-display {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px 20px;
    font-family: var(--font-mono);
    font-size: var(--font-size-sm);
    line-height: var(--line-height-loose);
    color: var(--color-ink-soft);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .prompt-display::-webkit-scrollbar { width: 4px; }
  .prompt-display::-webkit-scrollbar-track { background: transparent; }
  .prompt-display::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 2px; }

  .sidebar-actions {
    padding: 14px 20px;
    border-top: 1px solid var(--color-border);
  }

  .edit-btn {
    width: 100%;
    padding: 8px;
    background: none;
    border: 1px dashed var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-ink-muted);
    font-family: var(--font-mono);
    font-size: var(--font-size-sm);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: var(--letter-spacing-wide);
  }

  .edit-btn:hover {
    border-color: var(--color-amber);
    color: var(--color-amber);
    background: var(--color-amber-pale);
  }

  /* Prompt editor modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,23,20,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--color-warm-white);
    border-radius: var(--radius-xxl);
    padding: 28px;
    width: 680px;
    max-width: 95vw;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: var(--shadow-modal);
  }

  .modal h2 {
    font-family: var(--font-serif);
    font-weight: var(--font-weight-light);
    font-size: var(--font-size-xxl);
    color: var(--color-ink);
  }

  .modal textarea {
    flex: 1;
    min-height: 360px;
    font-family: var(--font-mono);
    font-size: var(--font-size-base);
    line-height: var(--line-height-double);
    padding: 14px;
    background: var(--color-cream);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    color: var(--color-ink);
    resize: vertical;
    outline: none;
  }

  .modal textarea:focus { border-color: var(--color-amber); }

  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-cancel {
    padding: 9px 20px;
    background: none;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-ink-muted);
    font-family: var(--font-sans);
    font-size: var(--font-size-md);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--color-ink-soft); color: var(--color-ink); }

  .btn-save {
    padding: 9px 20px;
    background: var(--color-amber);
    border: none;
    border-radius: var(--radius-md);
    color: white;
    font-family: var(--font-sans);
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-medium);
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-save:hover { background: var(--color-amber-light); }

  /* Chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 2px; }

  /* Welcome screen */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px;
    text-align: center;
  }

  .welcome-glyph {
    font-size: 48px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .welcome h1 {
    font-family: var(--font-serif);
    font-weight: var(--font-weight-light);
    font-size: var(--font-size-xxxl);
    color: var(--color-ink);
    letter-spacing: var(--letter-spacing-tight);
  }

  .welcome h1 em {
    font-style: italic;
    color: var(--color-amber);
  }

  .welcome p {
    font-size: var(--font-size-lg);
    color: var(--color-ink-muted);
    max-width: 380px;
    line-height: var(--line-height-relaxed);
  }

  .welcome-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .chip {
    padding: 7px 14px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-pill);
    font-size: var(--font-size-md);
    color: var(--color-ink-soft);
    cursor: pointer;
    transition: all 0.2s;
    background: var(--color-warm-white);
  }
  .chip:hover { border-color: var(--color-amber); color: var(--color-amber); background: var(--color-amber-pale); }

  /* Message bubbles */
  .msg {
    padding: 16px 40px;
    max-width: 100%;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    display: flex;
    justify-content: flex-end;
  }

  .msg.user .bubble {
    background: var(--color-ink);
    color: var(--color-cream);
    border-radius: var(--radius-chat-bubble-user);
    padding: 12px 18px;
    max-width: 65%;
    font-size: var(--font-size-lg);
    line-height: var(--line-height-relaxed);
  }

  .msg.assistant {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: var(--gradient-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-size-lg);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.assistant .content {
    flex: 1;
    max-width: 75%;
    font-size: var(--font-size-lg);
    line-height: var(--line-height-extra-loose);
    color: var(--color-ink-soft);
  }

  .msg.assistant .content p { margin-bottom: 10px; }
  .msg.assistant .content p:last-child { margin-bottom: 0; }

  .msg.assistant .content strong { color: var(--color-ink); font-weight: var(--font-weight-semibold); }

  .msg.assistant .content ul, .msg.assistant .content ol {
    padding-left: 20px;
    margin-bottom: 10px;
  }
  .msg.assistant .content li { margin-bottom: 4px; }

  .msg.assistant .content code {
    font-family: var(--font-mono);
    font-size: var(--font-size-base);
    background: var(--color-amber-pale);
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    color: var(--color-amber);
  }

  .msg.assistant .content pre {
    background: var(--color-ink);
    color: #F0E8D8;
    padding: 14px;
    border-radius: var(--radius-lg);
    overflow-x: auto;
    margin-bottom: 10px;
    font-family: var(--font-mono);
    font-size: var(--font-size-base);
    line-height: var(--line-height-relaxed);
  }

  .msg.assistant .content pre code {
    background: none;
    padding: 0;
    color: inherit;
  }

  /* Thinking indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 0;
  }

  .thinking span {
    width: 6px;
    height: 6px;
    border-radius: var(--radius-circle);
    background: var(--color-amber);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 60%, 100% { transform: scale(0.6); opacity: 0.4; }
    30% { transform: scale(1); opacity: 1; }
  }

  /* Input area */
  .input-area {
    padding: 16px 40px 24px;
    border-top: 1px solid var(--color-border);
    background: var(--color-cream);
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--color-warm-white);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-xxxl);
    padding: 10px 12px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--color-amber); }

  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: var(--font-sans);
    font-size: var(--font-size-lg);
    color: var(--color-ink);
    resize: none;
    min-height: 22px;
    max-height: 140px;
    line-height: var(--line-height-normal);
  }

  #userInput::placeholder { color: var(--color-ink-muted); }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-xl);
    background: var(--color-amber);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    color: white;
  }
  .send-btn:hover { background: var(--color-amber-light); transform: scale(1.05); }
  .send-btn:disabled { background: var(--color-border); cursor: not-allowed; transform: none; }

  .input-hint {
    text-align: center;
    font-family: var(--font-mono);
    font-size: var(--font-size-xs);
    color: var(--color-ink-muted);
    margin-top: 10px;
    letter-spacing: var(--letter-spacing-wide);
  }

  .error-msg {
    background: var(--color-error-bg);
    border: 1px solid var(--color-error-border);
    color: var(--color-error-text);
    border-radius: var(--radius-lg);
    padding: 10px 14px;
    font-size: var(--font-size-md);
    margin: 0 40px 10px;
  }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div class="logo-text">Gemini <span>à la Claude</span></div>
    <div class="badge">System Prompt Powered</div>
  </div>
  <div class="api-section">
    <div class="status-dot" id="statusDot"></div>
    <select id="modelSelect" class="api-input" style="width:200px;cursor:pointer;background:var(--color-cream)">
      <option value="gemini-2.5-flash">gemini-2.5-flash</option>
    </select>
    <input class="api-input" id="apiKey" type="password" placeholder="Gemini API Key">
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Sidebar: System Prompt viewer -->
  <div class="sidebar">
    <div class="sidebar-title">System Prompt</div>
    <div class="prompt-display" id="promptDisplay"></div>
    <div class="sidebar-actions">
      <button class="edit-btn" onclick="openModal()">✎ 编辑 System Prompt</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-glyph">✦</div>
        <h1>Gemini，<em>如 Claude 般</em></h1>
        <p>通过精心设计的 System Prompt，让 Gemini 以 Claude 的方式思考与表达。输入你的 API Key 开始对话。</p>
        <div class="welcome-chips">
          <div class="chip" onclick="quickAsk('你好！你能介绍一下自己吗？')">介绍你自己</div>
          <div class="chip" onclick="quickAsk('请解释什么是机器学习，用简单的语言。')">解释机器学习</div>
          <div class="chip" onclick="quickAsk('帮我写一首关于秋天的短诗')">写一首诗</div>
          <div class="chip" onclick="quickAsk('你有什么局限性？请诚实回答。')">你的局限性</div>
        </div>
      </div>
    </div>
    <div id="errorBanner" style="display:none"></div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="userInput" rows="1" placeholder="和 Claude 风格的 Gemini 聊聊…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 8L14 2L8 14L7 9L2 8Z" fill="white" stroke="white" stroke-width="1" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter 发送 · Shift+Enter 换行 · 请勿在不信任的网页使用真实 API Key</div>
    </div>
  </div>
</div>

<!-- Prompt editor modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>编辑 System Prompt</h2>
    <textarea id="promptEditor"></textarea>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="savePrompt()">保存并应用</button>
    </div>
  </div>
</div>

<!-- Main JS Entry -->
<script type="module" src="main.js"></script>

</body>
</html>
